[project]
name = "otampy"
dynamic = ["version"]
description = "OTA application firmware update solution for MicroPython"
readme = "README.md"
license = "SUL-1.0"
authors = [{ name = "Simon R. Lincoln", email = "oss@codeability.co.uk" }]
requires-python = ">=3.12"
dependencies = [
    "pyserial>=3.5",
    "urst>=1.0.0,<2.0.0",
    "click>=8.0.0",
    "rich>=13.0.0",
]

[project.scripts]
otampy = "otampy.cli:main"

[build-system]
requires = ["uv_build>=0.11.14,<0.12.0"]
build-backend = "uv_build"
